<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1000 220" role="img" aria-labelledby="signal-title signal-description">
  <title id="signal-title">Makaren Signal capabilities</title>
  <desc id="signal-description">Four technology modules connected to a shared signal backbone.</desc>
  <style>
      :root { color-scheme: light; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace; }
      .label { fill: #5E6B78; font-size: 11px; letter-spacing: 2px; }
      .copy { fill: #17212B; }
      .muted { fill: #5E6B78; }
      .signal { fill: #087F8C; }
      .line { stroke: #CBD5DD; }
      .final-opacity { opacity: var(--final-opacity, 1); }
      .reveal { animation: reveal var(--reveal-duration, .32s) ease-out var(--reveal-delay, 0s) both; }
      .draw { animation: draw var(--draw-duration, 1.5s) ease-out var(--draw-delay, 0s) both; }
      .connection { vector-effect: non-scaling-stroke; }
      @keyframes reveal { from { opacity: 0; } to { opacity: var(--final-opacity, 1); } }
      @keyframes draw { from { stroke-dashoffset: 1; } to { stroke-dashoffset: 0; } }
      @media (prefers-reduced-motion: reduce) {
        .motion { display: none !important; }
        .reveal { animation: none !important; opacity: var(--final-opacity, 1) !important; }
        .draw { animation: none !important; stroke-dashoffset: 0 !important; }
      }

      .motion { display: none !important; }
      .reveal { animation: none !important; opacity: var(--final-opacity, 1) !important; }
      .draw { animation: none !important; stroke-dashoffset: 0 !important; }

    </style>
  <rect width="1000" height="220" fill="#F7F9FB" rx="12"/>
<text class="sans copy" x="48" y="51" font-size="25" font-weight="650" letter-spacing="1">CAPABILITIES</text><path class="draw" style="--draw-duration:.65s" d="M 84 112 H 916" fill="none" stroke="#55B8C1" stroke-width="1.2" pathLength="1" stroke-dasharray="1" stroke-dashoffset="0"/><g class="reveal" style="--final-opacity:1.000;--reveal-delay:0.450s;--reveal-duration:0.34s" opacity="1"><line x1="110" y1="112" x2="110" y2="136" stroke="#CBD5DD"/><circle cx="110" cy="112" r="4" fill="#087F8C"/><text class="mono signal" x="110" y="158" font-size="11" text-anchor="start" letter-spacing="1.5">BACKEND</text><text class="sans copy" x="110" y="183" font-size="13" text-anchor="start">.NET · C# · Node.js · PHP · Lua</text></g><g class="reveal" style="--final-opacity:1.000;--reveal-delay:0.610s;--reveal-duration:0.34s" opacity="1"><line x1="370" y1="112" x2="370" y2="94" stroke="#CBD5DD"/><circle cx="370" cy="112" r="4" fill="#087F8C"/><text class="mono signal" x="370" y="88" font-size="11" text-anchor="start" letter-spacing="1.5">FRONTEND</text><text class="sans copy" x="370" y="66" font-size="13" text-anchor="start">React · JavaScript · Tailwind CSS</text></g><g class="reveal" style="--final-opacity:1.000;--reveal-delay:0.770s;--reveal-duration:0.34s" opacity="1"><line x1="610" y1="112" x2="610" y2="136" stroke="#CBD5DD"/><circle cx="610" cy="112" r="4" fill="#087F8C"/><text class="mono signal" x="610" y="158" font-size="11" text-anchor="start" letter-spacing="1.5">DATA</text><text class="sans copy" x="610" y="183" font-size="13" text-anchor="start">PostgreSQL · MySQL · InterSystems Caché</text></g><g class="reveal" style="--final-opacity:1.000;--reveal-delay:0.930s;--reveal-duration:0.34s" opacity="1"><line x1="920" y1="112" x2="920" y2="94" stroke="#CBD5DD"/><circle cx="920" cy="112" r="4" fill="#087F8C"/><text class="mono signal" x="920" y="88" font-size="11" text-anchor="end" letter-spacing="1.5">PLATFORM</text><text class="sans copy" x="920" y="66" font-size="13" text-anchor="end">Docker · Linux · macOS · Windows · Git</text></g></svg>
