name: Generate GitHub Profile Stats

on:
  schedule:
    - cron: "0 0 * * *" # Обновляется каждый день в полночь
  workflow_dispatch: # Позволяет запускать вручную
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate GitHub Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub Metrics (IsoCalendar & Languages)
        uses: lowlighter/metrics@latest
        with:
          filename: dist/github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, repositories
          # Изометрический 3D календарь
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          # Статистика по языкам (круговая диаграмма)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          # Явно отключаем просмотры профиля
          plugin_traffic: no

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
