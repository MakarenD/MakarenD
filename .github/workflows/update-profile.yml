name: Update Makaren Signal

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/makaren-signal

concurrency:
  group: makaren-signal-output
  cancel-in-progress: false

jobs:
  build:
    name: Generate and validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --requirement profile/requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Check Python sources
        run: python -m compileall -q profile

      - name: Check Python style
        run: |
          ruff check profile
          ruff format --check profile

      - name: Run unit tests
        run: python -m unittest discover -s profile/tests -p "test_*.py" -v

      - name: Verify README synchronization
        run: python -m profile.generate --check-readme

      - name: Generate signal assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: python -m profile.generate --output-dir dist

      - name: Run browser visual QA
        run: python -m profile.qa_visual --output-dir qa-artifacts/makaren-signal

      - name: Verify generated assets
        shell: bash
        run: |
          set -euo pipefail
          sections=(hero capabilities history)
          themes=(dark light)
          for section in "${sections[@]}"; do
            for theme in "${themes[@]}"; do
              test -s "dist/signal-${section}-${theme}.svg"
              test -s "dist/signal-${section}-${theme}-mobile.svg"
              test -s "dist/signal-${section}-${theme}-reduced.svg"
              test -s "dist/signal-${section}-${theme}-mobile-reduced.svg"
            done
          done
          test -s "dist/signal-systems-header-dark.svg"
          test -s "dist/signal-systems-header-light.svg"
          while IFS= read -r id; do
            for theme in dark light; do
              test -s "dist/signal-system-${id}-${theme}.svg"
            done
          done < <(python -c 'import json; print(*[item["id"] for item in json.load(open("profile/config.json"))["connected_systems"]], sep="\\n")')

      - name: Upload signal assets
        uses: actions/upload-artifact@v7
        with:
          name: makaren-signal-assets
          path: dist/signal-*.svg
          if-no-files-found: error
          retention-days: 7

      - name: Upload visual QA
        uses: actions/upload-artifact@v7
        with:
          name: makaren-signal-visual-qa
          path: qa-artifacts/makaren-signal
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish output branch
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download signal assets
        uses: actions/download-artifact@v8
        with:
          name: makaren-signal-assets
          path: generated

      - name: Checkout output branch
        uses: actions/checkout@v7
        with:
          ref: output
          path: output-branch
          fetch-depth: 1
          token: ${{ github.token }}

      - name: Publish signal assets
        shell: bash
        run: |
          set -euo pipefail
          install -m 0644 generated/signal-*.svg output-branch/
          cd output-branch
          git add -- signal-*.svg
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Signal assets are unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Makaren Signal assets"
          git push origin HEAD:output
