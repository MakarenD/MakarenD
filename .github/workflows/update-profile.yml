name: Update profile graphics

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-profile.yml"
      - "profile/**"

permissions:
  contents: write

concurrency:
  group: profile-graphics
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            profile/requirements.txt
            profile/qa-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r profile/requirements.txt -r profile/qa-requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run generator tests
        run: python -m unittest discover -s profile/tests -v

      - name: Generate profile graphics
        env:
          PROFILE_GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN || github.token }}
        run: python profile/generate.py --portrait-cache profile/portrait-mosaic.json --output dist

      - name: Run browser visual QA
        run: python profile/qa_visual.py --assets dist --output qa-artifacts/timeline

      - name: Upload visual QA timeline
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: profile-animation-timeline
          path: qa-artifacts/timeline
          if-no-files-found: error
          retention-days: 14

      - name: Publish generated assets
        env:
          OUTPUT_DIR: ${{ runner.temp }}/profile-output
        run: |
          git fetch origin output
          git worktree add --detach "$OUTPUT_DIR" origin/output
          cp dist/hero-dark.svg dist/hero-light.svg "$OUTPUT_DIR"/
          cp dist/activity-dark.svg dist/activity-light.svg "$OUTPUT_DIR"/
          git -C "$OUTPUT_DIR" config user.name "github-actions[bot]"
          git -C "$OUTPUT_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$OUTPUT_DIR" add hero-dark.svg hero-light.svg activity-dark.svg activity-light.svg
          if git -C "$OUTPUT_DIR" diff --cached --quiet; then
            echo "Profile graphics are already current."
          else
            git -C "$OUTPUT_DIR" commit -m "Update profile graphics"
            git -C "$OUTPUT_DIR" push origin HEAD:output
          fi
