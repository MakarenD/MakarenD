<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 360 490" role="img" aria-labelledby="signal-title signal-description">
  <title id="signal-title">Makaren Signal capabilities</title>
  <desc id="signal-description">Four technology modules connected to a shared signal backbone.</desc>
  <style>
      :root { color-scheme: dark; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', monospace; }
      .label { fill: #7D8590; font-size: 11px; letter-spacing: 2px; }
      .copy { fill: #E6EDF3; }
      .muted { fill: #7D8590; }
      .signal { fill: #32D6E2; }
      .line { stroke: #26303B; }
      .final-opacity { opacity: var(--final-opacity, 1); }
      .reveal { animation: reveal var(--reveal-duration, .32s) ease-out var(--reveal-delay, 0s) both; }
      .draw { animation: draw var(--draw-duration, 1.5s) ease-out var(--draw-delay, 0s) both; }
      .connection { vector-effect: non-scaling-stroke; }
      @keyframes reveal { from { opacity: 0; } to { opacity: var(--final-opacity, 1); } }
      @keyframes draw { from { stroke-dashoffset: 1; } to { stroke-dashoffset: 0; } }
      @media (prefers-reduced-motion: reduce) {
        .motion { display: none !important; }
        .reveal { animation: none !important; opacity: var(--final-opacity, 1) !important; }
        .draw { animation: none !important; stroke-dashoffset: 0 !important; }
      }

      .motion { display: none !important; }
      .reveal { animation: none !important; opacity: var(--final-opacity, 1) !important; }
      .draw { animation: none !important; stroke-dashoffset: 0 !important; }

    </style>
  <rect width="360" height="490" fill="#080B10" rx="12"/>
<text class="sans copy" x="24" y="48" font-size="23" font-weight="650" letter-spacing="1">CAPABILITIES</text><path class="draw" style="--draw-duration:.65s" d="M 42 84 V 444" fill="none" stroke="#1B7D86" stroke-width="1.2" pathLength="1" stroke-dasharray="1" stroke-dashoffset="0"/><g class="reveal" style="--final-opacity:1.000;--reveal-delay:0.450s;--reveal-duration:0.34s" opacity="1"><line x1="42" y1="112" x2="72" y2="112" stroke="#26303B"/><circle cx="42" cy="112" r="4" fill="#32D6E2"/><text class="mono signal" x="82" y="104" font-size="11" letter-spacing="1.5">BACKEND</text><text class="sans copy" x="82" y="128" font-size="14">.NET · C# · Node.js · PHP · Lua</text></g><g class="reveal" style="--final-opacity:1.000;--reveal-delay:0.610s;--reveal-duration:0.34s" opacity="1"><line x1="42" y1="200" x2="72" y2="200" stroke="#26303B"/><circle cx="42" cy="200" r="4" fill="#32D6E2"/><text class="mono signal" x="82" y="192" font-size="11" letter-spacing="1.5">FRONTEND</text><text class="sans copy" x="82" y="216" font-size="14">React · JavaScript · Tailwind CSS</text></g><g class="reveal" style="--final-opacity:1.000;--reveal-delay:0.770s;--reveal-duration:0.34s" opacity="1"><line x1="42" y1="288" x2="72" y2="288" stroke="#26303B"/><circle cx="42" cy="288" r="4" fill="#32D6E2"/><text class="mono signal" x="82" y="280" font-size="11" letter-spacing="1.5">DATA</text><text class="sans copy" x="82" y="304" font-size="14">PostgreSQL · MySQL · InterSystems Caché</text></g><g class="reveal" style="--final-opacity:1.000;--reveal-delay:0.930s;--reveal-duration:0.34s" opacity="1"><line x1="42" y1="376" x2="72" y2="376" stroke="#26303B"/><circle cx="42" cy="376" r="4" fill="#32D6E2"/><text class="mono signal" x="82" y="368" font-size="11" letter-spacing="1.5">PLATFORM</text><text class="sans copy" x="82" y="392" font-size="14">Docker · Linux · macOS · Windows · Git</text></g></svg>
